<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Кредитный калькулятор</title><style>@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700;800&display=swap');:root{--bg:#f3f4f6;--t:#111827;--m:#6b7280;--l:#d1d5db;--b:#1d4ed8;--d:#1f2937;--r:#b91c1c;--rb:#fef2f2;--g:#15803d;--gb:#ecfdf5}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--t);font-family:'IBM Plex Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif}.app{max-width:760px;margin:auto;padding:16px 16px 76px}button,input,select{font-family:inherit}h1{font-size:34px;margin:0 0 8px;font-weight:800;letter-spacing:-.03em}h2{font-size:26px;margin:0 0 20px}h3{margin:0 0 12px}.sub{font-size:20px;color:var(--m);line-height:1.35;margin:0 0 24px}.tabs{display:flex;gap:12px;overflow:auto;margin-bottom:22px}.tabs::-webkit-scrollbar{display:none}.sw,.btns{display:grid;grid-template-columns:1fr 1fr;gap:12px}.btns{display:none;margin-top:22px}button{border:0;border-radius:14px;font-weight:800;cursor:pointer;min-height:58px;padding:14px 18px;font-size:20px}.tab,.type{background:#fff;border:1px solid var(--l);color:var(--t)}.tab{padding:14px 22px;font-size:18px;min-height:54px}.on,.pri{background:var(--b)!important;color:#fff!important}.sec{background:var(--d);color:#fff}.card,.subcard{background:#fff;border:1px solid var(--l);border-radius:22px;padding:28px;margin-bottom:16px}.subcard{padding:20px}.type{min-height:54px;font-size:18px}.grid,.grid2{display:grid;grid-template-columns:1fr;gap:18px}p{margin:0}label{display:block;color:var(--m);font-size:18px;margin:0 0 8px}input,select{width:100%;height:58px;border:1px solid var(--l);border-radius:14px;background:#fff;font-size:26px;padding:10px 16px;color:var(--t)}select{font-size:20px}.res{display:grid;gap:12px;margin-top:20px}.box{border:1px solid var(--l);border-radius:14px;background:#f9fafb;padding:16px}.box small{display:block;color:var(--m);margin-bottom:6px}.box b{font-size:19px}.red{color:var(--r)}.green{color:var(--g)}.msg{margin-top:14px;padding:12px;border-radius:12px;font-size:14px}.warn{background:#fff7ed;color:#9a3412;border:1px solid #fed7aa}.ok{background:#ecfdf5;color:#166534;border:1px solid #bbf7d0}.wrap{overflow:auto;margin-top:18px;border:1px solid var(--l);border-radius:14px;background:#fff}table{min-width:700px;width:100%;border-collapse:collapse;font-size:13px}th,td{border-bottom:1px solid var(--l);padding:10px 8px;text-align:right;white-space:nowrap}th{background:#eef2f7}td:first-child,th:first-child{text-align:center}.hide{display:none!important}.print{display:none}.bar{position:fixed;left:16px;right:16px;bottom:12px;display:grid;grid-template-columns:1fr 1fr;gap:10px;z-index:20}.bar button{min-height:42px;font-size:14px;padding:8px 12px;border-radius:10px;box-shadow:0 6px 16px rgba(17,24,39,.14)}.bottomPdf{display:none;margin-top:18px}.bottomPdf.show{display:block}.bottomPdf button{width:100%;background:var(--d);color:#fff;min-height:52px;font-size:17px}.cmp{margin-top:18px;border:1px solid var(--l);border-radius:16px;background:#fff;overflow:auto}.cmp table{min-width:760px;width:100%;font-size:14px}.cmp th,.cmp td{padding:12px 10px;text-align:left;white-space:normal}.name{font-weight:800}.badge{display:inline-block;border-radius:10px;padding:6px 10px;font-weight:800}.good{background:var(--gb);color:var(--g)}.bad{background:var(--rb);color:var(--r)}.neutral{background:#f9fafb;color:var(--t)}.adv{border-top:1px solid var(--l);padding-top:14px;margin-top:4px}@media(max-width:767px){.cmp{border:0;background:transparent;overflow:visible}.cmp table,.cmp thead,.cmp tbody,.cmp tr,.cmp td{display:block;min-width:0;width:100%}.cmp thead{display:none}.cmp tr{background:#fff;border:1px solid var(--l);border-radius:16px;margin:0 0 12px;overflow:hidden}.cmp td{display:grid;grid-template-columns:42% 58%;gap:10px;align-items:center;border-bottom:1px solid var(--l);padding:12px 14px;text-align:right!important;white-space:normal}.cmp td:last-child{border-bottom:0}.cmp td:before{color:var(--m);font-size:13px;font-weight:700;text-align:left;content:attr(data-label)}.cmp .name{font-size:18px}.badge{justify-self:end;text-align:center}}@media(min-width:768px){.app{max-width:940px;padding:22px 22px 64px}h1{font-size:28px}h2{font-size:22px}.sub{font-size:16px}.tab{font-size:16px;min-height:48px}.card{padding:22px}.type{min-height:48px;font-size:16px}.grid{grid-template-columns:repeat(3,1fr)}.grid2{grid-template-columns:repeat(2,1fr)}label{font-size:14px}input,select{height:48px;font-size:17px}button{min-height:48px;font-size:16px}.res{grid-template-columns:repeat(4,1fr)}.btns{display:grid}.bar{left:22px;right:22px;bottom:14px}.bar button{min-height:44px;font-size:14px}}@media(min-width:1100px){.app{max-width:1040px;padding:28px 24px}h1{font-size:24px}h2{font-size:19px;margin-bottom:14px}.sub{font-size:14px;margin-bottom:14px}.tabs{gap:8px;margin-bottom:14px}.tab{font-size:14px;padding:10px 14px;min-height:40px;border-radius:10px}.card{padding:18px;border-radius:14px}.subcard{padding:14px}.type{min-height:40px;font-size:14px;border-radius:10px}label{font-size:12px;margin-bottom:5px}input,select{height:40px;font-size:15px;border-radius:9px}button{min-height:40px;font-size:14px;border-radius:9px;padding:9px 14px}.box{padding:10px}.bar{display:none}.cmp table{font-size:13px}.cmp th,.cmp td{padding:9px 10px}.bottomPdf button{min-height:42px;font-size:14px}}@media(max-width:390px){.app{padding:14px 14px 72px}h1{font-size:30px}.sub{font-size:18px}.card{padding:22px}.tab{font-size:17px}.type{font-size:17px;min-height:50px}input{font-size:24px}.bar{left:14px;right:14px;bottom:10px}.bar button{min-height:40px;font-size:13px;padding:7px 10px}.bottomPdf button{min-height:48px;font-size:15px}}@media print{.tabs,.btns,.bar,.no,.bottomPdf{display:none!important}.app{max-width:none;padding:0}.card,.subcard{border:0;padding:0}.print{display:block}.wrap{overflow:visible;border:0}table{min-width:0;font-size:11px}th,td{border:1px solid #999;padding:5px}.cmp{overflow:visible}}</style></head><body><main class="app"><h1>Кредитный калькулятор</h1><div class="sub">Кредит, кредитная карта, сравнение и PDF.</div><div class="tabs no"><button class="tab on" onclick="tab('main',this)">Расчет</button><button class="tab" onclick="tab('cmp',this)">Сравнение</button></div><div class="print"><h1>Кредитный расчет</h1><p id="printDate"></p></div><section id="main"><div class="card"><h2>Основной расчет</h2><div class="sw no"><button id="loanBtn" class="type on" onclick="kind='loan';syncKind()">Кредит</button><button id="cardBtn" class="type" onclick="kind='card';syncKind()">Кредитная карта</button></div><div class="grid"><p><label id="amountLabel">Сумма кредита, ₽</label><input id="amount" type="number" placeholder="Например: 500000"></p><p><label>Годовая ставка, %</label><input id="rate" type="number" placeholder="Например: 20"></p><p id="termBox"><label>Срок, месяцев</label><input id="months" type="number" placeholder="Например: 36"></p><p id="payBox" class="hide"><label>Ежемесячный платеж, ₽</label><input id="pay" type="number" placeholder="Например: 10000"></p><p id="grBox" class="hide"><label>Льготный период, дней</label><input id="grace" type="number" placeholder="Например: 120"></p><p id="grUseBox" class="hide"><label>Льготный период</label><select id="gruse"><option value="yes">Учитывать</option><option value="no">Не учитывать</option></select></p><p id="comPctBox" class="hide"><label>Комиссия, %</label><input id="compct" type="number" placeholder="Например: 5.9"></p><p id="comFixBox" class="hide"><label>Комиссия фикс., ₽</label><input id="comfix" type="number" placeholder="Например: 590"></p><p id="minPctBox" class="hide"><label>Мин. платеж, %</label><input id="minpct" type="number" placeholder="Например: 3"></p><p id="minRubBox" class="hide"><label>Мин. платеж, не менее ₽</label><input id="minrub" type="number" placeholder="Например: 150"></p><p id="penBox" class="hide"><label>Штрафная ставка, %</label><input id="penrate" type="number" placeholder="Например: 36"></p><p id="missBox" class="hide"><label>Просрочка платежа</label><select id="miss"><option value="no">Нет</option><option value="yes">Да, применять штрафную ставку</option></select></p></div><div class="btns no"><button class="pri" onclick="mainCalc()">Рассчитать</button><button class="sec" onclick="makePdf()">Сохранить / отправить PDF</button></div><div id="out"></div><div id="tbl"></div><div id="bottomMainPdf" class="bottomPdf no"><button onclick="makePdf()">Распечатать / сохранить PDF</button></div></div></section><section id="cmp" class="hide"><div class="card"><h2>Сравнение двух вариантов</h2><div class="grid2"><div class="subcard"><h3>Вариант №1</h3><p><label>Название</label><input id="n1" type="text" placeholder="Например: Сбер кредит"></p><p><label>Тип</label><select id="t1" onchange="syncCmp(1)"><option value="loan">Кредит</option><option value="card">Кредитная карта</option></select></p><p><label id="a1l">Сумма кредита, ₽</label><input id="a1" type="number" placeholder="Например: 500000"></p><p><label>Годовая ставка, %</label><input id="r1" type="number" placeholder="Например: 20"></p><p id="m1b"><label>Срок, месяцев</label><input id="m1" type="number" placeholder="Например: 36"></p><div id="c1b" class="hide adv grid"><p><label>Ежемесячный платеж, ₽</label><input id="p1" type="number" placeholder="Например: 10000"></p><p><label>Льготный период, дней</label><input id="g1" type="number" placeholder="Например: 120"></p><p><label>Льготный период</label><select id="gu1"><option value="yes">Учитывать</option><option value="no">Не учитывать</option></select></p><p><label>Комиссия, %</label><input id="cp1" type="number" placeholder="Например: 5.9"></p><p><label>Комиссия фикс., ₽</label><input id="cf1" type="number" placeholder="Например: 590"></p><p><label>Мин. платеж, %</label><input id="mp1" type="number" placeholder="Например: 3"></p><p><label>Мин. платеж, ₽</label><input id="mr1" type="number" placeholder="Например: 150"></p><p><label>Штрафная ставка, %</label><input id="pr1" type="number" placeholder="Например: 36"></p><p><label>Просрочка</label><select id="ms1"><option value="no">Нет</option><option value="yes">Да</option></select></p></div></div><div class="subcard"><h3>Вариант №2</h3><p><label>Название</label><input id="n2" type="text" placeholder="Например: Т-Банк карта"></p><p><label>Тип</label><select id="t2" onchange="syncCmp(2)"><option value="loan">Кредит</option><option value="card">Кредитная карта</option></select></p><p><label id="a2l">Сумма кредита, ₽</label><input id="a2" type="number" placeholder="Например: 500000"></p><p><label>Годовая ставка, %</label><input id="r2" type="number" placeholder="Например: 18"></p><p id="m2b"><label>Срок, месяцев</label><input id="m2" type="number" placeholder="Например: 48"></p><div id="c2b" class="hide adv grid"><p><label>Ежемесячный платеж, ₽</label><input id="p2" type="number" placeholder="Например: 10000"></p><p><label>Льготный период, дней</label><input id="g2" type="number" placeholder="Например: 120"></p><p><label>Льготный период</label><select id="gu2"><option value="yes">Учитывать</option><option value="no">Не учитывать</option></select></p><p><label>Комиссия, %</label><input id="cp2" type="number" placeholder="Например: 5.9"></p><p><label>Комиссия фикс., ₽</label><input id="cf2" type="number" placeholder="Например: 590"></p><p><label>Мин. платеж, %</label><input id="mp2" type="number" placeholder="Например: 3"></p><p><label>Мин. платеж, ₽</label><input id="mr2" type="number" placeholder="Например: 150"></p><p><label>Штрафная ставка, %</label><input id="pr2" type="number" placeholder="Например: 36"></p><p><label>Просрочка</label><select id="ms2"><option value="no">Нет</option><option value="yes">Да</option></select></p></div></div></div><div class="btns no"><button class="pri" onclick="compare()">Сравнить</button><button class="sec" onclick="makePdf()">Сохранить / отправить PDF</button></div><div id="cout"></div><div id="bottomCmpPdf" class="bottomPdf no"><button onclick="makePdf()">Распечатать / сохранить PDF</button></div></div></section></main><div class="bar no"><button class="pri" onclick="active==='main'?mainCalc():compare()">Рассчитать</button><button class="sec" onclick="makePdf()">PDF</button></div><script>let active='main',kind='loan';const $=id=>document.getElementById(id),num=id=>+String($(id).value).replace(',','.')||0,rub=x=>new Intl.NumberFormat('ru-RU',{style:'currency',currency:'RUB',minimumFractionDigits:2}).format(x);function tab(id,b){active=id;$('main').classList.toggle('hide',id!=='main');$('cmp').classList.toggle('hide',id!=='cmp');document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));b.classList.add('on')}function show(ids,on){ids.forEach(id=>$(id).classList.toggle('hide',!on))}function syncKind(){loanBtn.classList.toggle('on',kind==='loan');cardBtn.classList.toggle('on',kind==='card');amountLabel.innerText=kind==='loan'?'Сумма кредита, ₽':'Текущий долг по карте, ₽';termBox.classList.toggle('hide',kind!=='loan');show(['payBox','grBox','grUseBox','comPctBox','comFixBox','minPctBox','minRubBox','penBox','missBox'],kind==='card');out.innerHTML='';tbl.innerHTML='';bottomMainPdf.classList.remove('show')}function syncCmp(i){let is=$('t'+i).value==='card';$('m'+i+'b').classList.toggle('hide',is);$('c'+i+'b').classList.toggle('hide',!is);$('a'+i+'l').innerText=is?'Текущий долг по карте, ₽':'Сумма кредита, ₽';cout.innerHTML='';bottomCmpPdf.classList.remove('show')}function makePdf(){active==='main'?mainCalc():compare();let d=new Date;printDate.innerText='Дата формирования: '+d.toLocaleDateString('ru-RU')+' '+d.toLocaleTimeString('ru-RU');setTimeout(()=>print(),100)}function ann(s,r,n){let m=r/100/12;return r?s*m*(1+m)**n/((1+m)**n-1):s/n}function loan(s,r,n){if(s<=0||r<0||n<=0)return{err:'Проверьте данные кредита.'};let m=r/100/12,p=ann(s,r,n),b=s,tp=0,ti=0,rows=[];for(let i=1;i<=n;i++){let pr=b*m,body=p-pr,pay=p;if(i===n){body=b;pay=body+pr}b-=body;if(b<.01)b=0;tp+=pay;ti+=pr;rows.push([i,pay,body,pr,b,''])}return{type:'loan',s,r,n,p,tp,ti,fee:null,min0:null,rows}}function card(o){let{s,r,p,g,gu,cp,cf,mp,mr,pr,ms}=o;if(s<=0||r<0||p<=0)return{err:'Проверьте данные кредитной карты.'};let fee=s*cp/100+cf,b=s+fee,n=0,tp=0,ti=0,rows=[],gm=gu==='yes'?Math.ceil(g/30):0,rate=ms==='yes'?pr:r,warn='';while(b>.01&&n<1200){n++;let req=Math.max(b*mp/100,mr),curRate=n<=gm?0:rate,monthRate=curRate/100/12,int=b*monthRate;if(p<int&&curRate>0)return{err:'Платеж меньше ежемесячных процентов. Долг не будет закрыт.'};if(p<req)warn='Плановый платеж ниже минимального обязательного платежа.';let body=p-int,pay=p;if(body>=b){body=b;pay=body+int}b-=body;if(b<.01)b=0;tp+=pay;ti+=int;rows.push([n,pay,body,int,b,req])}return{type:'card',s,r:rate,n,p,tp,ti,fee,min0:Math.max((s+fee)*mp/100,mr),warn,rows}}function fm(n){let y=Math.floor(n/12),m=n%12;return y&&m?`${y} г. ${m} мес.`:y?`${y} г.`:`${m} мес.`}function boxes(a){return'<div class="res">'+a.map(x=>`<div class="box"><small>${x[0]}</small><b class="${x[2]||''}">${x[1]}</b></div>`).join('')+'</div>'}function table(rows,showMin){let h='<div class="wrap"><table><tr><th>Месяц</th><th>Платеж</th><th>Основной долг</th><th>Проценты</th><th>Остаток</th>';if(showMin)h+='<th>Мин. платеж</th>';h+='</tr>';h+=rows.map(r=>`<tr><td>${r[0]}</td><td>${rub(r[1])}</td><td>${rub(r[2])}</td><td>${rub(r[3])}</td><td>${rub(r[4])}</td>${showMin?`<td>${rub(r[5])}</td>`:''}</tr>`).join('');return h+'</table></div>'}function mainCalc(){let x=kind==='loan'?loan(num('amount'),num('rate'),Math.round(num('months'))):card({s:num('amount'),r:num('rate'),p:num('pay'),g:num('grace'),gu:$('gruse').value,cp:num('compct'),cf:num('comfix'),mp:num('minpct'),mr:num('minrub'),pr:num('penrate'),ms:$('miss').value});if(x.err){out.innerHTML=`<div class="msg warn">${x.err}</div>`;tbl.innerHTML='';bottomMainPdf.classList.remove('show');return}let arr=[['Тип',kind==='loan'?'Кредит':'Кредитная карта'],[kind==='loan'?'Ежемесячный платеж':'Срок закрытия',kind==='loan'?rub(x.p):fm(x.n),'green'],['Всего выплатите',rub(x.tp)],['Переплата',rub(x.ti),'red']];if(kind==='card'){arr.push(['Комиссия',rub(x.fee)],['Мин. платеж 1 мес.',rub(x.min0)]);}out.innerHTML=boxes(arr)+(x.warn?`<div class="msg warn">${x.warn}</div>`:'');tbl.innerHTML=table(x.rows,kind==='card');bottomMainPdf.classList.add('show')}function opt(i){let is=$('t'+i).value==='card',name=($('n'+i).value||'').trim()||`Вариант №${i}`,res=is?card({s:num('a'+i),r:num('r'+i),p:num('p'+i),g:num('g'+i),gu:$('gu'+i).value,cp:num('cp'+i),cf:num('cf'+i),mp:num('mp'+i),mr:num('mr'+i),pr:num('pr'+i),ms:$('ms'+i).value}):loan(num('a'+i),num('r'+i),Math.round(num('m'+i)));if(res.err)return res;res.name=name;return res}function cls(a,b){if(a===b)return['neutral','neutral'];return a<b?['good','bad']:['bad','good']}function badge(v,c){return`<span class="badge ${c}">${v}</span>`}function compare(){let x=opt(1),y=opt(2);if(x.err||y.err){cout.innerHTML=`<div class="msg warn">${x.err||y.err}</div>`;bottomCmpPdf.classList.remove('show');return}let hasCard=x.type==='card'||y.type==='card',cr=cls(x.r,y.r),cp=cls(x.p,y.p),ct=cls(x.n,y.n),co=cls(x.ti,y.ti),cf=hasCard&&x.type==='card'&&y.type==='card'?cls(x.fee,y.fee):['neutral','neutral'],verdict=x.ti<y.ti?`По переплате выгоднее «${x.name}».`:y.ti<x.ti?`По переплате выгоднее «${y.name}».`:'По переплате варианты равны.';function row(o,a){let html=`<tr><td data-label="Название" class="name">${o.name}</td><td data-label="Тип">${o.type==='loan'?'Кредит':'Карта'}</td><td data-label="% ставка">${badge(o.r.toFixed(2)+'%',a.r)}</td><td data-label="Платеж">${badge(rub(o.p),a.p)}</td><td data-label="Срок">${badge(fm(o.n),a.n)}</td>`;if(hasCard)html+=`<td data-label="Комиссия">${o.type==='loan'?badge('—','neutral'):badge(rub(o.fee),a.f)}</td>`;return html+`<td data-label="Переплата">${badge(rub(o.ti),a.t)}</td></tr>`}cout.innerHTML=`<div class="cmp"><table><thead><tr><th>Название</th><th>Тип</th><th>%</th><th>Платеж</th><th>Срок</th>${hasCard?'<th>Комиссия</th>':''}<th>Переплата</th></tr></thead><tbody>${row(x,{r:cr[0],p:cp[0],n:ct[0],f:cf[0],t:co[0]})}${row(y,{r:cr[1],p:cp[1],n:ct[1],f:cf[1],t:co[1]})}</tbody></table></div><div class="msg ok">Зеленым выделены более выгодные показатели, красным — менее выгодные.</div><div class="msg ok">${verdict}</div>`;bottomCmpPdf.classList.add('show')}</script></body></html>
