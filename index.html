<!doctype html><html lang=ru><head><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><title>Кредитный калькулятор</title><style>
:root{--b:#f3f4f6;--c:#fff;--t:#111827;--m:#6b7280;--l:#d1d5db;--p:#1d4ed8;--d:#1f2937;--r:#b91c1c;--g:#15803d}*{box-sizing:border-box}body{margin:0;background:var(--b);color:var(--t);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}.app{max-width:720px;margin:auto;padding:16px 16px 58px}h1{font-size:34px;margin:0 0 8px}h2{font-size:26px;margin:0 0 20px}.sub{font-size:20px;color:var(--m);line-height:1.35;margin-bottom:24px}.tabs,.sw{display:flex;gap:12px;margin-bottom:22px}.tabs{overflow:auto}.tabs::-webkit-scrollbar{display:none}button{border:0;border-radius:14px;font-weight:800;cursor:pointer;min-height:58px;padding:14px 18px;font-size:20px}.tab{background:#fff;border:1px solid var(--l);padding:17px 28px}.on,.pri{background:var(--p)!important;color:white!important}.card,.subcard{background:#fff;border:1px solid var(--l);border-radius:22px;padding:28px;margin-bottom:16px}.subcard{padding:20px}.sw{display:grid;grid-template-columns:1fr 1fr}.type{background:#fff;border:1px solid var(--l);min-height:78px;color:var(--t)}.grid,.grid2{display:grid;grid-template-columns:1fr;gap:18px}label{display:block;color:var(--m);font-size:18px;margin:0 0 8px}input,select{width:100%;height:58px;border:1px solid var(--l);border-radius:14px;background:#fff;font-size:26px;padding:10px 16px}select{font-size:20px}.btns{display:grid;gap:12px;margin-top:22px}.sec{background:var(--d);color:white}.res{display:grid;gap:12px;margin-top:20px}.box{border:1px solid var(--l);border-radius:14px;background:#f9fafb;padding:16px}.box small{display:block;color:var(--m);margin-bottom:6px}.box b{font-size:19px}.red{color:var(--r)}.green{color:var(--g)}.msg{margin-top:14px;padding:12px;border-radius:12px;font-size:14px}.warn{background:#fff7ed;color:#9a3412;border:1px solid #fed7aa}.ok{background:#ecfdf5;color:#166534;border:1px solid #bbf7d0}.wrap{overflow:auto;margin-top:18px;border:1px solid var(--l);border-radius:14px;background:#fff}table{min-width:720px;width:100%;border-collapse:collapse;font-size:13px}th,td{border-bottom:1px solid var(--l);padding:10px 8px;text-align:right}th{background:#eef2f7}td:first-child,th:first-child{text-align:center}.hide{display:none!important}.print{display:none}.bar{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--l);display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:5px 12px calc(5px + env(safe-area-inset-bottom))}.bar button{min-height:30px;font-size:12px;padding:5px 8px;border-radius:8px}
@media(min-width:768px){.app{max-width:900px;padding:22px 22px 64px}h1{font-size:28px}h2{font-size:22px}.sub{font-size:16px}.tab{font-size:16px;padding:13px 18px}.card{padding:22px}.type{min-height:58px;font-size:18px}.grid{grid-template-columns:repeat(3,1fr)}.grid2{grid-template-columns:repeat(2,1fr)}label{font-size:14px}input,select{height:48px;font-size:17px}button{min-height:48px;font-size:16px}.res{grid-template-columns:repeat(4,1fr)}.btns{grid-template-columns:1fr 1fr}}
@media(min-width:1100px){.app{max-width:980px;padding:28px 24px}h1{font-size:24px}h2{font-size:19px;margin-bottom:14px}.sub{font-size:14px;margin-bottom:14px}.tabs{gap:8px;margin-bottom:14px}.tab{font-size:14px;padding:10px 14px;border-radius:10px}.card{padding:18px;border-radius:14px}.subcard{padding:14px}.sw{gap:10px;margin-bottom:14px}.type{min-height:44px;font-size:15px;border-radius:10px}label{font-size:12px;margin-bottom:5px}input,select{height:40px;font-size:15px;border-radius:9px}button{min-height:40px;font-size:14px;border-radius:9px;padding:9px 14px}.box{padding:10px}.box small{font-size:11px}.box b{font-size:16px}th,td{padding:7px 8px}.bar{display:none}}
@media(max-width:390px){.app{padding:14px 14px 56px}h1{font-size:30px}.sub{font-size:18px}.card{padding:22px}.tab{font-size:18px;padding:15px 22px}.type{font-size:20px;min-height:70px}input{font-size:24px}}
@media print{.tabs,.btns,.bar,.no{display:none!important}.app{max-width:none;padding:0}.card,.subcard{border:0;padding:0}.print{display:block}.res{grid-template-columns:repeat(2,1fr)}.box{border:1px solid #999}.wrap{overflow:visible;border:0}table{min-width:0;font-size:11px}th,td{border:1px solid #999;padding:5px}}
</style></head><body><main class=app><h1>Кредитный калькулятор</h1><div class=sub>Расчет кредита, кредитной карты, сравнение вариантов и сохранение результата в PDF.</div><div class="tabs no"><button class="tab on" onclick="tab('a',this)">Расчет</button><button class=tab onclick="tab('b',this)">Сравнение</button></div><div class=print><h1>Кредитный расчет</h1><p id=pd></p></div>
<section id=a><div class=card><h2>Основной расчет</h2><div class="sw no"><button id=loanBtn class="type on" onclick="kind='loan';ui()">Кредит</button><button id=cardBtn class=type onclick="kind='card';ui()">Кредитная карта</button></div><div class=grid><p><label id=amountL>Сумма кредита, ₽</label><input id=amount type=number inputmode=decimal value=500000></p><p><label>Годовая ставка, %</label><input id=rate type=number inputmode=decimal value=20></p><p id=termBox><label>Срок, месяцев</label><input id=months type=number inputmode=numeric value=36></p><p id=payBox class=hide><label>Ежемесячный платеж, ₽</label><input id=pay type=number inputmode=decimal value=10000></p></div><div class="btns no"><button class=pri onclick=mainCalc()>Рассчитать</button><button class=sec onclick=pdf()>Сохранить / отправить PDF</button></div><div id=out></div><div id=tbl></div></div></section>
<section id=b class=hide><div class=card><h2>Сравнение двух вариантов</h2><div class=grid2><div class=subcard><h3>Вариант №1</h3><label>Тип</label><select id=t1 onchange=cmpUi(1)><option value=loan>Кредит</option><option value=card>Кредитная карта</option></select><label id=a1l>Сумма кредита, ₽</label><input id=a1 type=number value=500000><label>Годовая ставка, %</label><input id=r1 type=number value=20><p id=m1b><label>Срок, месяцев</label><input id=m1 type=number value=36></p><p id=p1b class=hide><label>Ежемесячный платеж, ₽</label><input id=p1 type=number value=10000></p></div><div class=subcard><h3>Вариант №2</h3><label>Тип</label><select id=t2 onchange=cmpUi(2)><option value=loan>Кредит</option><option value=card>Кредитная карта</option></select><label id=a2l>Сумма кредита, ₽</label><input id=a2 type=number value=500000><label>Годовая ставка, %</label><input id=r2 type=number value=18><p id=m2b><label>Срок, месяцев</label><input id=m2 type=number value=48></p><p id=p2b class=hide><label>Ежемесячный платеж, ₽</label><input id=p2 type=number value=10000></p></div></div><div class="btns no"><button class=pri onclick=compare()>Сравнить</button><button class=sec onclick=pdf()>Сохранить / отправить PDF</button></div><div id=cout></div></div></section></main><div class="bar no"><button class=pri onclick="active==='a'?mainCalc():compare()">Рассчитать</button><button class=sec onclick=pdf()>PDF</button></div>
<script>
let active='a',kind='loan';let rub=x=>new Intl.NumberFormat('ru-RU',{style:'currency',currency:'RUB',minimumFractionDigits:2}).format(x),v=id=>+String(document.getElementById(id).value).replace(',','.')||0;function tab(id,b){active=id;document.getElementById('a').classList.toggle('hide',id!=='a');document.getElementById('b').classList.toggle('hide',id!=='b');document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));b.classList.add('on')}function ui(){loanBtn.classList.toggle('on',kind==='loan');cardBtn.classList.toggle('on',kind==='card');amountL.innerText=kind==='loan'?'Сумма кредита, ₽':'Текущий долг по карте, ₽';termBox.classList.toggle('hide',kind!=='loan');payBox.classList.toggle('hide',kind==='loan');out.innerHTML='';tbl.innerHTML=''}function cmpUi(i){let t=g('t'+i).value;g('m'+i+'b').classList.toggle('hide',t==='card');g('p'+i+'b').classList.toggle('hide',t==='loan');g('a'+i+'l').innerText=t==='loan'?'Сумма кредита, ₽':'Текущий долг по карте, ₽';cout.innerHTML=''}function g(id){return document.getElementById(id)}function pdf(){active==='a'?mainCalc():compare();let d=new Date;pd.innerText='Дата формирования: '+d.toLocaleDateString('ru-RU')+' '+d.toLocaleTimeString('ru-RU');setTimeout(()=>print(),100)}function ann(s,r,n){let m=r/100/12;return r?s*m*(1+m)**n/((1+m)**n-1):s/n}function loan(s,r,n){let m=r/100/12,p=ann(s,r,n),b=s,tp=0,ti=0,a=[];for(let i=1;i<=n;i++){let pr=b*m,od=p-pr,pay=p;if(i===n){od=b;pay=od+pr}b-=od;if(b<.01)b=0;tp+=pay;ti+=pr;a.push([i,pay,od,pr,b])}return{type:'loan',s,r,n,p,tp,ti,a}}function card(s,r,p){let m=r/100/12,first=s*m;if(r&&p<=first)return{e:'Платеж меньше процентов. Долг не будет закрыт.'};let b=s,i=0,tp=0,ti=0,a=[];while(b>.01&&i<1200){i++;let pr=b*m,od=p-pr,pay=p;if(od>=b){od=b;pay=od+pr}b-=od;if(b<.01)b=0;tp+=pay;ti+=pr;a.push([i,pay,od,pr,b])}return{type:'card',s,r,n:i,p,tp,ti,a}}function fm(n){let y=Math.floor(n/12),m=n%12;return y&&m?`${y} г. ${m} мес.`:y?`${y} г.`:`${m} мес.`}function boxes(x){return'<div class=res>'+x.map(i=>`<div class=box><small>${i[0]}</small><b class="${i[2]||''}">${i[1]}</b></div>`).join('')+'</div>'}function table(a){return'<div class=wrap><table><tr><th>Месяц</th><th>Платеж</th><th>Основной долг</th><th>Проценты</th><th>Остаток</th></tr>'+a.map(r=>`<tr><td>${r[0]}</td><td>${rub(r[1])}</td><td>${rub(r[2])}</td><td>${rub(r[3])}</td><td>${rub(r[4])}</td></tr>`).join('')+'</table></div>'}function mainCalc(){let x=kind==='loan'?loan(v('amount'),v('rate'),Math.round(v('months'))):card(v('amount'),v('rate'),v('pay'));if(x.e){out.innerHTML=`<div class="msg warn">${x.e}</div>`;tbl.innerHTML='';return}out.innerHTML=boxes([['Тип',kind==='loan'?'Кредит':'Кредитная карта'],[kind==='loan'?'Ежемесячный платеж':'Срок закрытия',kind==='loan'?rub(x.p):fm(x.n),kind==='loan'?'':'green'],['Всего выплатите',rub(x.tp)],['Переплата',rub(x.ti),'red']]);tbl.innerHTML=table(x.a)}function opt(i){return g('t'+i).value==='loan'?loan(v('a'+i),v('r'+i),Math.round(v('m'+i))):card(v('a'+i),v('r'+i),v('p'+i))}function compare(){let x=opt(1),y=opt(2);if(x.e||y.e){cout.innerHTML=`<div class="msg warn">${x.e||y.e}</div>`;return}let c=x.ti<y.ti?'Выгоднее вариант №1.':y.ti<x.ti?'Выгоднее вариант №2.':'Переплата равна.';cout.innerHTML=boxes([['Платеж №1',rub(x.p)],['Срок №1',fm(x.n)],['Переплата №1',rub(x.ti),'red'],['Платеж №2',rub(y.p)],['Срок №2',fm(y.n)],['Переплата №2',rub(y.ti),'red']])+`<div class="msg ok">${c}</div>`}mainCalc();
</script></body></html>
