<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Кредитный калькулятор</title><style>@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700;800&display=swap');:root{--bg:#f3f4f6;--c:#fff;--t:#111827;--m:#6b7280;--l:#d1d5db;--b:#1d4ed8;--d:#1f2937;--r:#b91c1c;--rb:#fef2f2;--g:#15803d;--gb:#ecfdf5}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--t);font-family:'IBM Plex Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif}button,input,select{font-family:inherit}.app{max-width:720px;margin:auto;padding:16px 16px 92px}h1{font-size:34px;margin:0 0 8px;font-weight:800;letter-spacing:-.03em}h2{font-size:26px;margin:0 0 20px}.sub{font-size:20px;color:var(--m);line-height:1.35;margin:0 0 24px}.tabs,.sw,.btns{display:grid;grid-template-columns:1fr 1fr;gap:12px}.tabs{display:flex;overflow:auto;margin-bottom:22px}.tabs::-webkit-scrollbar{display:none}button{border:0;border-radius:14px;font-weight:800;cursor:pointer;min-height:58px;padding:14px 18px;font-size:20px}.tab{background:#fff;border:1px solid var(--l);padding:14px 22px;font-size:18px;min-height:54px}.on,.pri{background:var(--b)!important;color:#fff!important}.sec{background:var(--d);color:#fff}.card,.subcard{background:#fff;border:1px solid var(--l);border-radius:22px;padding:28px;margin-bottom:16px}.subcard{padding:20px}.type{background:#fff;border:1px solid var(--l);min-height:54px;color:var(--t);font-size:18px;padding:14px 22px}.grid,.grid2{display:grid;grid-template-columns:1fr;gap:18px}p{margin:0}label{display:block;color:var(--m);font-size:18px;margin:0 0 8px}input,select{width:100%;height:58px;border:1px solid var(--l);border-radius:14px;background:#fff;font-size:26px;padding:10px 16px;color:var(--t);outline:none}select{font-size:20px}.btns{margin-top:22px}.res{display:grid;gap:12px;margin-top:20px}.box{border:1px solid var(--l);border-radius:14px;background:#f9fafb;padding:16px}.box small{display:block;color:var(--m);margin-bottom:6px}.box b{font-size:19px}.red{color:var(--r)}.green{color:var(--g)}.msg{margin-top:14px;padding:12px;border-radius:12px;font-size:14px}.warn{background:#fff7ed;color:#9a3412;border:1px solid #fed7aa}.ok{background:#ecfdf5;color:#166534;border:1px solid #bbf7d0}.wrap{overflow:auto;margin-top:18px;border:1px solid var(--l);border-radius:14px;background:#fff}table{min-width:720px;width:100%;border-collapse:collapse;font-size:13px}th,td{border-bottom:1px solid var(--l);padding:10px 8px;text-align:right;white-space:nowrap}th{background:#eef2f7}td:first-child,th:first-child{text-align:center}.hide{display:none!important}.print{display:none}.bar{position:fixed;left:16px;right:16px;bottom:18px;display:grid;grid-template-columns:1fr 1fr;gap:12px;z-index:20}.bar button{min-height:52px;font-size:16px;padding:12px 14px;border-radius:12px;box-shadow:0 8px 22px rgba(17,24,39,.16)}.cmp{margin-top:18px;border:1px solid var(--l);border-radius:16px;background:#fff;overflow:auto}.cmp table{min-width:760px;width:100%;font-size:14px}.cmp th,.cmp td{padding:12px 10px;text-align:left;white-space:normal}.cmp th{font-size:12px;color:var(--m);background:#f8fafc}.cmp .num{text-align:right}.cmp .cent{text-align:center}.name{font-weight:800}.badge{display:inline-block;border-radius:10px;padding:6px 10px;font-weight:800}.good{background:var(--gb);color:var(--g)}.bad{background:var(--rb);color:var(--r)}.neutral{background:#f9fafb;color:var(--t)}@media(min-width:768px){.app{max-width:900px;padding:22px 22px 64px}h1{font-size:28px}h2{font-size:22px}.sub{font-size:16px}.tab{font-size:16px;padding:13px 18px;min-height:48px}.card{padding:22px}.type{min-height:48px;font-size:16px}.grid{grid-template-columns:repeat(3,1fr)}.grid2{grid-template-columns:repeat(2,1fr)}label{font-size:14px}input,select{height:48px;font-size:17px}button{min-height:48px;font-size:16px}.res{grid-template-columns:repeat(4,1fr)}}@media(min-width:1100px){.app{max-width:980px;padding:28px 24px}h1{font-size:24px}h2{font-size:19px;margin-bottom:14px}.sub{font-size:14px;margin-bottom:14px}.tabs{gap:8px;margin-bottom:14px}.tab{font-size:14px;padding:10px 14px;min-height:40px;border-radius:10px}.card{padding:18px;border-radius:14px}.subcard{padding:14px}.type{min-height:40px;font-size:14px;border-radius:10px}label{font-size:12px;margin-bottom:5px}input,select{height:40px;font-size:15px;border-radius:9px}button{min-height:40px;font-size:14px;border-radius:9px;padding:9px 14px}.box{padding:10px}.bar{display:none}.cmp table{font-size:13px}.cmp th,.cmp td{padding:9px 10px}}@media(max-width:390px){.app{padding:14px 14px 90px}h1{font-size:30px}.sub{font-size:18px}.card{padding:22px}.tab{font-size:17px;padding:13px 20px}.type{font-size:17px;min-height:50px}input{font-size:24px}.bar{left:14px;right:14px;bottom:16px}.bar button{min-height:50px}}@media print{.tabs,.btns,.bar,.no{display:none!important}.app{max-width:none;padding:0}.card,.subcard{border:0;padding:0}.print{display:block}.wrap{overflow:visible;border:0}table{min-width:0;font-size:11px}th,td{border:1px solid #999;padding:5px}.cmp{overflow:visible}}</style></head><body><main class="app"><h1>Кредитный калькулятор</h1><div class="sub">Расчет кредита, кредитной карты, сравнение вариантов и сохранение результата в PDF.</div><div class="tabs no"><button class="tab on" onclick="tab('main',this)">Расчет</button><button class="tab" onclick="tab('cmp',this)">Сравнение</button></div><div class="print"><h1>Кредитный расчет</h1><p id="printDate"></p></div><section id="main"><div class="card"><h2>Основной расчет</h2><div class="sw no"><button id="loanBtn" class="type on" onclick="kind='loan';syncKind()">Кредит</button><button id="cardBtn" class="type" onclick="kind='card';syncKind()">Кредитная карта</button></div><div class="grid"><p><label id="amountLabel">Сумма кредита, ₽</label><input id="amount" type="number" value="500000"></p><p><label>Годовая ставка, %</label><input id="rate" type="number" value="20"></p><p id="termBox"><label>Срок, месяцев</label><input id="months" type="number" value="36"></p><p id="payBox" class="hide"><label>Ежемесячный платеж, ₽</label><input id="pay" type="number" value="10000"></p></div><div class="btns no"><button class="pri" onclick="mainCalc()">Рассчитать</button><button class="sec" onclick="makePdf()">Сохранить / отправить PDF</button></div><div id="out"></div><div id="tbl"></div></div></section><section id="cmp" class="hide"><div class="card"><h2>Сравнение двух вариантов</h2><div class="grid2"><div class="subcard"><h3>Вариант №1</h3><p><label>Название</label><input id="n1" type="text" value="Кредит 1" placeholder="Например: Сбер 300 тыс."></p><p><label>Тип</label><select id="t1" onchange="syncCmp(1)"><option value="loan">Кредит</option><option value="card">Кредитная карта</option></select></p><p><label id="a1l">Сумма кредита, ₽</label><input id="a1" type="number" value="500000"></p><p><label>Годовая ставка, %</label><input id="r1" type="number" value="20"></p><p id="m1b"><label>Срок, месяцев</label><input id="m1" type="number" value="36"></p><p id="p1b" class="hide"><label>Ежемесячный платеж, ₽</label><input id="p1" type="number" value="10000"></p></div><div class="subcard"><h3>Вариант №2</h3><p><label>Название</label><input id="n2" type="text" value="Кредит 2" placeholder="Например: Т-Банк карта"></p><p><label>Тип</label><select id="t2" onchange="syncCmp(2)"><option value="loan">Кредит</option><option value="card">Кредитная карта</option></select></p><p><label id="a2l">Сумма кредита, ₽</label><input id="a2" type="number" value="500000"></p><p><label>Годовая ставка, %</label><input id="r2" type="number" value="18"></p><p id="m2b"><label>Срок, месяцев</label><input id="m2" type="number" value="48"></p><p id="p2b" class="hide"><label>Ежемесячный платеж, ₽</label><input id="p2" type="number" value="10000"></p></div></div><div class="btns no"><button class="pri" onclick="compare()">Сравнить</button><button class="sec" onclick="makePdf()">Сохранить / отправить PDF</button></div><div id="cout"></div></div></section></main><div class="bar no"><button class="pri" onclick="active==='main'?mainCalc():compare()">Рассчитать</button><button class="sec" onclick="makePdf()">PDF</button></div><script>let active='main',kind='loan';const $=id=>document.getElementById(id),num=id=>+String($(id).value).replace(',','.')||0,rub=x=>new Intl.NumberFormat('ru-RU',{style:'currency',currency:'RUB',minimumFractionDigits:2}).format(x);function tab(id,b){active=id;$('main').classList.toggle('hide',id!=='main');$('cmp').classList.toggle('hide',id!=='cmp');document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));b.classList.add('on')}function syncKind(){loanBtn.classList.toggle('on',kind==='loan');cardBtn.classList.toggle('on',kind==='card');amountLabel.innerText=kind==='loan'?'Сумма кредита, ₽':'Текущий долг по карте, ₽';termBox.classList.toggle('hide',kind!=='loan');payBox.classList.toggle('hide',kind==='loan');out.innerHTML='';tbl.innerHTML=''}function syncCmp(i){let t=$('t'+i).value;$('m'+i+'b').classList.toggle('hide',t==='card');$('p'+i+'b').classList.toggle('hide',t==='loan');$('a'+i+'l').innerText=t==='loan'?'Сумма кредита, ₽':'Текущий долг по карте, ₽';cout.innerHTML=''}function makePdf(){active==='main'?mainCalc():compare();let d=new Date;printDate.innerText='Дата формирования: '+d.toLocaleDateString('ru-RU')+' '+d.toLocaleTimeString('ru-RU');setTimeout(()=>print(),100)}function ann(s,r,n){let m=r/100/12;return r?s*m*(1+m)**n/((1+m)**n-1):s/n}function loan(s,r,n){if(s<=0||r<0||n<=0)return{err:'Проверьте данные кредита.'};let m=r/100/12,p=ann(s,r,n),b=s,tp=0,ti=0,rows=[];for(let i=1;i<=n;i++){let pr=b*m,body=p-pr,pay=p;if(i===n){body=b;pay=body+pr}b-=body;if(b<.01)b=0;tp+=pay;ti+=pr;rows.push([i,pay,body,pr,b])}return{type:'loan',s,r,n,p,tp,ti,rows}}function card(s,r,p){if(s<=0||r<0||p<=0)return{err:'Проверьте данные кредитной карты.'};let m=r/100/12,first=s*m;if(r&&p<=first)return{err:'Платеж меньше ежемесячных процентов. Долг не будет закрыт.'};let b=s,n=0,tp=0,ti=0,rows=[];while(b>.01&&n<1200){n++;let pr=b*m,body=p-pr,pay=p;if(body>=b){body=b;pay=body+pr}b-=body;if(b<.01)b=0;tp+=pay;ti+=pr;rows.push([n,pay,body,pr,b])}return{type:'card',s,r,n,p,tp,ti,rows}}function fm(n){let y=Math.floor(n/12),m=n%12;return y&&m?`${y} г. ${m} мес.`:y?`${y} г.`:`${m} мес.`}function boxes(a){return'<div class="res">'+a.map(x=>`<div class="box"><small>${x[0]}</small><b class="${x[2]||''}">${x[1]}</b></div>`).join('')+'</div>'}function table(rows){return'<div class="wrap"><table><tr><th>Месяц</th><th>Платеж</th><th>Основной долг</th><th>Проценты</th><th>Остаток</th></tr>'+rows.map(r=>`<tr><td>${r[0]}</td><td>${rub(r[1])}</td><td>${rub(r[2])}</td><td>${rub(r[3])}</td><td>${rub(r[4])}</td></tr>`).join('')+'</table></div>'}function mainCalc(){let x=kind==='loan'?loan(num('amount'),num('rate'),Math.round(num('months'))):card(num('amount'),num('rate'),num('pay'));if(x.err){out.innerHTML=`<div class="msg warn">${x.err}</div>`;tbl.innerHTML='';return}out.innerHTML=boxes([['Тип',kind==='loan'?'Кредит':'Кредитная карта'],[kind==='loan'?'Ежемесячный платеж':'Срок закрытия',kind==='loan'?rub(x.p):fm(x.n),kind==='loan'?'':'green'],['Всего выплатите',rub(x.tp)],['Переплата',rub(x.ti),'red']]);tbl.innerHTML=table(x.rows)}function opt(i){let type=$('t'+i).value,name=($('n'+i).value||'').trim()||`Вариант №${i}`,res=type==='loan'?loan(num('a'+i),num('r'+i),Math.round(num('m'+i))):card(num('a'+i),num('r'+i),num('p'+i));if(res.err)return res;res.name=name;return res}function cls(a,b){if(a===b)return['neutral','neutral'];return a<b?['good','bad']:['bad','good']}function badge(v,c){return`<span class="badge ${c}">${v}</span>`}function compare(){let x=opt(1),y=opt(2);if(x.err||y.err){cout.innerHTML=`<div class="msg warn">${x.err||y.err}</div>`;return}let cr=cls(x.r,y.r),cp=cls(x.p,y.p),ct=cls(x.n,y.n),co=cls(x.ti,y.ti),verdict=x.ti<y.ti?`По переплате выгоднее «${x.name}».`:y.ti<x.ti?`По переплате выгоднее «${y.name}».`:'По переплате варианты равны.';cout.innerHTML=`<div class="cmp"><table><thead><tr><th>Название</th><th>Тип</th><th>%</th><th>Платеж</th><th>Срок</th><th>Переплата</th></tr></thead><tbody><tr><td class="name">${x.name}</td><td>${x.type==='loan'?'Кредит':'Кредитная карта'}</td><td class="cent">${badge(x.r.toFixed(2)+'%',cr[0])}</td><td class="num">${badge(rub(x.p),cp[0])}</td><td class="cent">${badge(fm(x.n),ct[0])}</td><td class="num">${badge(rub(x.ti),co[0])}</td></tr><tr><td class="name">${y.name}</td><td>${y.type==='loan'?'Кредит':'Кредитная карта'}</td><td class="cent">${badge(y.r.toFixed(2)+'%',cr[1])}</td><td class="num">${badge(rub(y.p),cp[1])}</td><td class="cent">${badge(fm(y.n),ct[1])}</td><td class="num">${badge(rub(y.ti),co[1])}</td></tr></tbody></table></div><div class="msg ok">Зеленым выделены более выгодные показатели, красным — менее выгодные.</div><div class="msg ok">${verdict}</div>`}mainCalc();</script></body></html>
